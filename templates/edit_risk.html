<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Risk</title>

    <script>
        const savedTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
    </script>

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

    <div class="page-header">
        <h1>Edit Risk</h1>
        <a class="back-link" href="{{ url_for('dashboard') }}">← Back to Dashboard</a>
    </div>

    <div class="panel form-panel edit-panel">
        <h2>{{ risk["id"] }} - {{ risk["name"] }}</h2>

        <form class="risk-form edit-risk-form"
              action="{{ url_for('edit_risk', risk_id=risk['id']) }}"
              method="POST">

            <div class="form-group wide-field">
                <label for="name">Risk Name</label>

                <input
                    type="text"
                    id="name"
                    name="name"
                    value="{{ risk['name'] }}"
                    required
                >
            </div>

            <div class="form-group">
                <label for="severity">Severity</label>

                <input
                    type="number"
                    id="severity"
                    name="severity"
                    min="1"
                    max="10"
                    value="{{ risk['severity'] }}"
                    required
                >
            </div>

            <div class="form-group">
                <label for="category">Category</label>

                <select id="category" name="category" required>
                    {% for category in categories %}
                    <option
                        value="{{ category }}"
                        {% if category == risk['category'] %}selected{% endif %}
                    >
                        {{ category }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="status">Status</label>

                <select id="status" name="status" required>
                    {% for status in statuses %}
                    <option
                        value="{{ status }}"
                        {% if status == risk['status'] %}selected{% endif %}
                    >
                        {{ status }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="owner">Owner</label>

                <select id="owner" name="owner" required>
                    {% for owner in owners %}
                    <option
                        value="{{ owner }}"
                        {% if owner == risk['owner'] %}selected{% endif %}
                    >
                        {{ owner }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="due_date">Due Date</label>

                <input
                    type="date"
                    id="due_date"
                    name="due_date"
                    value="{{ risk['due_date'] }}"
                    required
                >
            </div>

            <div class="form-actions edit-actions">
                <button type="submit">Save Changes</button>

                <a class="cancel-link"
                   href="{{ url_for('dashboard') }}">
                    Cancel
                </a>
            </div>

        </form>
    </div>

</body>
</html>
